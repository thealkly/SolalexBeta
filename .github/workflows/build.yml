name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  lint-and-test:
    name: lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Backend — sync
        working-directory: backend
        run: uv sync --frozen

      - name: Backend — ruff
        working-directory: backend
        run: uv run ruff check .

      - name: Backend — mypy
        working-directory: backend
        run: uv run mypy .

      - name: Backend — pytest
        working-directory: backend
        run: uv run pytest -q

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend — install
        working-directory: frontend
        run: npm ci

      - name: Frontend — check
        working-directory: frontend
        run: npm run check

      - name: Frontend — build
        working-directory: frontend
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  docker:
    name: docker multi-arch
    needs: lint-and-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base-python:3.13-alpine3.19
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base-python:3.13-alpine3.19
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: addon/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ matrix.base }}
          tags: |
            ghcr.io/alkly/solalex-${{ matrix.arch }}:latest
            ghcr.io/alkly/solalex-${{ matrix.arch }}:${{ github.sha }}
          cache-from: type=gha,scope=solalex-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=solalex-${{ matrix.arch }}
