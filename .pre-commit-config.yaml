# Pre-commit hooks for the Solalex monorepo.
# NOTE: Hooks are intentionally light in Story 1.1. Full lint/test coverage runs
# in CI (.github/workflows/pr-check.yml). Extend hooks as the project grows.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # Prettier — the former `pre-commit/mirrors-prettier` repo is archived
  # (last release was an alpha). Use a local hook that calls the prettier
  # already pinned in `frontend/package.json` instead — one prettier version,
  # no mirror repo to rot.
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx --prefix frontend --no prettier --write
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|svelte|css|html|json|md|yml|yaml)$
        pass_filenames: true

      # ESLint stub — calls the same eslint version pinned in frontend/.
      # Kept lightweight (no --fix, no type-aware rules) so pre-commit stays
      # fast; full lint runs in CI. Full ESLint coverage is expected to land
      # alongside the frontend test suite in a later story.
      - id: eslint
        name: eslint
        entry: npx --prefix frontend --no eslint --max-warnings=0
        language: system
        files: ^frontend/.*\.(ts|svelte)$
        pass_filenames: true
